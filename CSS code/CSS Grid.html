<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
      .box{
        border: 2px solid red;
        display: grid;
        grid-template-areas: "nav nav nav"
                             "side arcticle arcticle"
                             "footer footer footer"
      }

      .item{
        border: 2px solid black ;
        height: 55px;
        
      }
      .item1{
        grid-area: nav;
        background-color: red;   
      }
      .item2{
        grid-area: side;
        background-color: aquamarine;
      }
      .item3{
       grid-area: arcticle;
       background-color: saddlebrown;
      }
      .item4{
        grid-area: footer;
        background-color: darkgrey;
      }
    </style>
</head>
<body>
    <div class="box">
        <div class="item item1">1  1  1 1 1</div>
        <div class="item">2 2 2 2</div>
        <div class="item">3 3 3</div>
        <div class="item item4">4   4 4 4 4</div>
        <div class="item">5 5 5 5 5</div>
    </div>
</body>
</html>
