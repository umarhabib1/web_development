<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bouncing ball animation</title>
    <style>
        .container {
            background-color: blue;
            height: 80vh;
            width: 80vw;
            position: relative;
        }

        .box {
            background-color: red;
            height: 100px;
            width: 100px;
            border-radius: 100%;
            position: absolute;
            bottom: 0;
            left: 0;

            animation: AnimationX 3s  infinite linear, AnimationY 1s  infinite ease-in-out alternate;;
            

        }

        @keyframes AnimationX {
            from {
                left: 0;
            }

            to {
                left: 100%;
            }
        }
        @keyframes AnimationY {
            from {
                bottom: 0;
            }

            to {
                bottom: 100%;
            }
        }

       
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>

</html>
