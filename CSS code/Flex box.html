<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex box</title>
    <style>
        .container {
            border: 2px solid red;
            display: flex;
            height: 80vh;
            align-items: center;
            /* flex-direction: column; */
            justify-content: center;
            /* align-content: flex-start; */
            /* flex-wrap: wrap; */
            flex-flow: row wrap;
            gap: 20px;
            row-gap: 10px;
            column-gap: 5px;
            /* gap: 10px 5px ;  first row and second column */
        }

        .box {
            width: 92px;
            height: 92px;
            background-color: blueviolet;
            border: 2px solid black;
        }

        .oreder-0 {
            order: -3;
        }

        .oreder-1 {
            order: 1;
            align-self: self-start;
        }

        .oreder-2 {
            order: 2;
            justify-self:right;
        }

        .oreder-3 {
            order: 3;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box oreder-1">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box"></div>
        <div class="box oreder-0">dsfjdkajflkdjsd</div>
        <div class="box"></div>
        <div class="box oreder-2">order 2</div>
        <div class="box"></div>
        <div class="box oreder-3"> order 3</div>
        <div class="box"></div>
    </div>
</body>

</html>
