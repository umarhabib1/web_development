<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>designing navbar</title>
    <style>
        * {
            margin: 0;
            position: 0;
        }

        nav {
            background-color: #f6f6f6;
            width: 90vw;
            height: 15vh;
            margin: 20px;
            margin-left: 60px;
            display: flex;
            align-items: center;


        }

        a {
            text-decoration: none;
            color: black;
        }

        .box1 {

            display: flex;
            justify-content: center;
            /* center horizontally */
            align-items: center;
            /* center vertically */
            gap: 20px;
            /* space between links */
            width: 50%;
        }

        #btn {
            background-color: #ffd741;
            border-radius: 10px;
            padding: 10px 23px 8px ;
        }
        #img2{
            margin: 0px px 0  0;
            padding: 0px 4px 0px 44px;
        }

        img{
            padding:1
        }
        #img3{
              padding: 0px 4px 0px 44px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <img src="/CSS code/designing a navbar using CSS/UE_Site-Logo.png" alt="" width="150px">
            <div class="box1">
                <a href="" target="_blank">Products</a>
                <a href="" target="_blank">Buy</a>
                <a href="" target="_blank">Support</a>
                <a href="" target="_blank">Learn</a>
                <a href="" target="_blank">Company</a>
            </div>
            <div class="box2">
                <a href="" id="btn">Download </a>
                <img src="/CSS code/designing a navbar using CSS/world.png" alt="" id="img2" width="16px">
                <span>English</span>
                <img src="/CSS code/designing a navbar using CSS/search-icon-png-9985.png" id="img3" alt="" width="16px">
            </div>
        </nav>
    </header>
    
</body>

</html>
