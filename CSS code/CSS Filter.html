<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filter</title>
</head>
<style>
     #a1{
        filter: blur(5px);
     }

     #a2{
        filter: brightness(9);
     }
     #a3{
         filter: contrast(200px);
     }
     #a4{
        filter: drop-shadow(16px 16px 10px black);
     }
     #a5{
        filter: grayscale(10%);
     }

     #a6{
        filter: hue-rotate(100deg);
     }

     .box{
        border-radius: 50%;
        width: 200px;
        height: 200px;
        background-color: blue;
        filter: drop-shadow(16px 16px 10px black);
     }



</style>
<body>
    <div class="container"></div>
    <img  id="a1" src="https://tr.rbxcdn.com/180DAY-da431c483c048ebaba0c0caeb17d5770/768/432/Image/Webp/noFilter" alt="">
    <img  id="a2" src="https://tr.rbxcdn.com/180DAY-da431c483c048ebaba0c0caeb17d5770/768/432/Image/Webp/noFilter" alt="">
    <img  id="a3" src="https://tr.rbxcdn.com/180DAY-da431c483c048ebaba0c0caeb17d5770/768/432/Image/Webp/noFilter" alt="">
    <img  id="a4" src="https://tr.rbxcdn.com/180DAY-da431c483c048ebaba0c0caeb17d5770/768/432/Image/Webp/noFilter" alt="">
    <img  id="a5" src="https://tr.rbxcdn.com/180DAY-da431c483c048ebaba0c0caeb17d5770/768/432/Image/Webp/noFilter" alt="">
    <img  id="a6" src="https://tr.rbxcdn.com/180DAY-da431c483c048ebaba0c0caeb17d5770/768/432/Image/Webp/noFilter" alt="">
 <br>
 <br><br>
 <br>
 
 <div class="box"></div>
</body>
</html>
