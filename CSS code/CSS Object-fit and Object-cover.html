<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Object-fit and Object-cover</title>
    <style>
        .container{
            height: 450px;
            width: 600px;
            border: 2px solid black;
            background-color: azure;
            background-position: center center;
            background-image: url(https://tr.rbxcdn.com/180DAY-da431c483c048ebaba0c0caeb17d5770/768/432/Image/Webp/noFilter);
            background-repeat: no-repeat;
           }

        img{
            height: 450px;
            width: 600px;
            /* object-position: top left; */
            object-position: 10px 20px ;
            object-fit: cover;
            /* object-fit: scale-down; */
        }
    </style>
</head>
<body>
   <div class="container">
    <!-- <img src="https://tr.rbxcdn.com/180DAY-da431c483c048ebaba0c0caeb17d5770/768/432/Image/Webp/noFilter" alt=""> -->
   </div>
</body>
</html>
